<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>南海バス リアルタイム位置</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .bus-popup {
            min-width: 220px;
            line-height: 1.6;
        }

        .bus-number {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .bus-route {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .bus-info {
            font-size: 13px;
        }
        #update-time {
    position: absolute;
    top: 10px;
    right: 10px;

    padding: 8px 12px;
    border-radius: 8px;

    font-size: 13px;
    font-weight: bold;

    z-index: 9999;

    transition: .3s;
}

.status-green{
    background:#28a745;
    color:white;
}

.status-yellow{
    background:#ffc107;
    color:black;
}

.status-orange{
    background:#fd7e14;
    color:white;
}

.status-red{
    background:#dc3545;
    color:white;
}
#credits-button {
    position: fixed;
    right: 10px;
    bottom: 28px;
    z-index: 1100;

    border: 1px solid #777;
    border-radius: 6px;
    padding: 5px 9px;

    background: rgba(255, 255, 255, 0.92);
    color: #222;

    font-size: 12px;
    cursor: pointer;

    box-shadow: 0 1px 5px rgba(0, 0, 0, 0.25);
}

#credits-panel {
    display: none;

    position: fixed;
    right: 10px;
    bottom: 65px;
    z-index: 1200;

    width: min(340px, calc(100vw - 24px));
    max-height: 60vh;
    overflow-y: auto;

    box-sizing: border-box;
    padding: 18px 16px 12px;

    background: rgba(255, 255, 255, 0.97);
    color: #222;

    border-radius: 10px;
    box-shadow: 0 3px 14px rgba(0, 0, 0, 0.35);

    font-size: 13px;
    line-height: 1.6;
}

#credits-panel.open {
    display: block;
}

#credits-panel p {
    margin: 8px 0;
}

#credits-panel a {
    color: #0066cc;
}

#credits-close {
    position: absolute;
    top: 4px;
    right: 8px;

    border: none;
    background: transparent;

    font-size: 24px;
    cursor: pointer;
}

@media (max-width: 600px) {
    #credits-button {
        right: 8px;
        bottom: 32px;
        padding: 4px 7px;
        font-size: 11px;
    }

    #credits-panel {
        right: 8px;
        bottom: 68px;
        width: calc(100vw - 16px);
        max-height: 45vh;
        font-size: 12px;
    }
}
    </style>
</head>
<body>
<button id="credits-button" type="button">
    ⓘ データ提供
</button>

<div id="credits-panel">
    <button id="credits-close" type="button">×</button>

    <strong>データ提供・出典</strong>

    <p>
        和歌山バス・和歌山バス那賀の位置情報には、
        各社公開のGTFS／GTFS Realtimeデータを利用しています。
    </p>

    <p>
        ライセンス：
        <a
            href="https://creativecommons.org/licenses/by/4.0/deed.ja"
            target="_blank"
            rel="noopener noreferrer"
        >
            CC BY 4.0
        </a>
    </p>

    <p>
        <a
            href="https://www.wakayamabus.co.jp/"
            target="_blank"
            rel="noopener noreferrer"
        >
            和歌山バス公式サイト
        </a>
        <br>
        <a
            href="https://wakayamabusnaga.com/"
            target="_blank"
            rel="noopener noreferrer"
        >
            和歌山バス那賀公式サイト
        </a>
    </p>
</div>

    <div id="map"></div>
    <div id="update-time">更新日時: 読み込み中...</div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    ></script>

    <script>
        const map = L.map("map").setView(
            [34.52, 135.47],
            11
        );

        L.tileLayer(
            "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
            {
                maxZoom: 19,
                attribution:
                    "&copy; OpenStreetMap contributors"
            }
        ).addTo(map);

        /*
         * 型式・備考から使用する画像ファイルを決める
         */
        function getBusIconFile(vehicle) {
            if (!vehicle) {
                return null;
            }

            const model = String(
                vehicle.model || ""
            ).toUpperCase();

            const note = String(
                vehicle.note || ""
            );

            /*
             * 特別塗装・専用車を先に判定
             */
            if (note.includes("サザンクロス")) {
                return "bus-cerega-sc.png";
            }

            if (
                note.includes("堺シャトル") ||
                /HL2ANAP/i.test(model)
            ) {
                return "sakaishuttle.png";
            }

            /*
             * 電気バス・輸入車・特殊車
             */
            if (/ZAC-LV828L1/i.test(model)) {
                return "bus-ergaev.png";
            }

            if (/B10A01/i.test(model)) {
                return "bus-b10a01.png";
            }

            if (/O530G/i.test(model)) {
                return "bus-citarog.png";
            }

            if (/LX525Z1/i.test(model)) {
                return "bus-lx525z1.png";
            }

            if (/MUM1NAE/i.test(model)) {
                return "bus-mum1nae.png";
            }

            /*
             * 高速・貸切車
             */
            if (/(MS06GP|MS96VP)/i.test(model)) {
                return "bus-aero-ace.png";
            }

            if (/-RU/i.test(model)) {
                return "bus-cerega.png";
            }

            /*
             * 一般路線車
             */
            if (/-MP\d+/i.test(model)) {
                return "bus-aerostar.png";
            }

            if (/-KV\d+/i.test(model)) {
                return "bus-blueribbon2.png";
            }

            if (/-LV\d+/i.test(model)) {
                return "bus-erga.png";
            }

            if (/-KR/i.test(model)) {
                return "bus-rainbow2.png";
            }

            if (/-HX/i.test(model)) {
                return "bus-poncho.png";
            }

            if (/-HU/i.test(model)) {
                return "bus-blue-ribbon-city.png";
            }

            /*
             * エルガミオは現在bus-erga.pngを共用
             */
            if (/-LR/i.test(model)) {
                return "bus-erga.png";
            }

            /*
             * 和歌山バス車両一覧の日本語車種名にも対応
             * より具体的な名前を先に判定する
             */
            if (model.includes("エルガミオ")) {
                return "bus-erga.png";
            }

            if (model.includes("エルガ")) {
                return "bus-erga.png";
            }

            if (model.includes("ブルーリボンシティ")) {
                return "bus-blue-ribbon-city.png";
            }

            if (model.includes("ブルーリボン")) {
                return "bus-blueribbon2.png";
            }

            if (model.includes("レインボー")) {
                return "bus-rainbow2.png";
            }

            if (model.includes("ポンチョ")) {
                return "bus-poncho.png";
            }

            if (model.includes("エアロスター")) {
                return "bus-aerostar.png";
            }

            if (
                model.includes("エアロエース") ||
                model.includes("エアロバス")
            ) {
                return "bus-aero-ace.png";
            }

            if (model.includes("セレガ")) {
                return "bus-cerega.png";
            }

            return null;
        }

        /*
         * ポップアップに表示する車種名
         */
        function getBusTypeName(vehicle) {
            if (!vehicle) {
                return "車種不明";
            }

            const model = String(
                vehicle.model || ""
            ).toUpperCase();

            const note = String(
                vehicle.note || ""
            );

            if (note.includes("サザンクロス")) {
                return "日野 セレガ（サザンクロス）";
            }

            if (
                note.includes("堺シャトル") ||
                model.includes("HL2ANAP")
            ) {
                return "日野 ブルーリボン ハイブリッド（堺シャトル）";
            }

            if (model.includes("ZAC-LV828L1")) {
                return "いすゞ エルガEV";
            }

            if (model.includes("B10A01")) {
                return "BYD 電気バス";
            }

            if (model.includes("O530G")) {
                return "メルセデス・ベンツ シターロG";
            }

            if (model.includes("LX525Z1")) {
                return "いすゞ エルガ デュオ";
            }

            if (model.includes("MUM1NAE")) {
                return "TOYOTA SORA";
            }

            if (
                model.includes("MS06GP") ||
                model.includes("MS96VP")
            ) {
                return "三菱ふそう エアロエース";
            }

            if (/-MP35/i.test(model)) {
                return "三菱ふそう エアロスター";
            }

            if (/-MP37/i.test(model)) {
                return "三菱ふそう エアロスター ノンステップ";
            }

            if (/-MP38/i.test(model)) {
                return "三菱ふそう エアロスター";
            }

            if (/-KV234/i.test(model)) {
                return "日野 ブルーリボンII";
            }

            if (/-KV290/i.test(model)) {
                return "日野 ブルーリボン";
            }

            if (/-LV234/i.test(model)) {
                return "いすゞ エルガ";
            }

            if (/-LV290/i.test(model)) {
                return "いすゞ エルガ";
            }

            if (/-RU/i.test(model)) {
                return "日野 セレガ";
            }

            if (/-KR234/i.test(model)) {
                return "日野 レインボーII";
            }

            if (/-KR290/i.test(model)) {
                return "日野 レインボー";
            }

            if (/-LR234/i.test(model)) {
                return "いすゞ エルガミオ";
            }

            if (/-LR290/i.test(model)) {
                return "いすゞ エルガミオ";
            }

            if (/-HX/i.test(model)) {
                return "日野 ポンチョ";
            }

            if (/-HU/i.test(model)) {
                return "日野 ブルーリボンシティ";
            }

            if (/-RJ/i.test(model)) {
                return "日野 レインボーRJ";
            }

            if (/-AR/i.test(model)) {
                return "日産ディーゼル スペースランナー";
            }

            return "車種不明";
        }

        const busIconCache = {};

        function createBusIcon(vehicle, companyConfig) {
            const iconFile =
                getBusIconFile(vehicle);

            if (!iconFile) {
                return null;
            }

            const iconBasePath =
                companyConfig.iconBasePath || "icons";

            const cacheKey =
                `${iconBasePath}/${iconFile}`;

            if (!busIconCache[cacheKey]) {
                busIconCache[cacheKey] = L.icon({
                    iconUrl:
                        `${iconBasePath}/${iconFile}`,
                    iconSize: [48, 48],
                    iconAnchor: [24, 24],
                    popupAnchor: [0, -24]
                });
            }

            return busIconCache[cacheKey];
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        /*
         * 表示する事業者
         *
         * 和歌山バスのデータが完成したら、
         * companyConfigsへ設定を追加するだけで読み込める。
         */
        const companyConfigs = [
            {
                id: "nankai",
                name: "南海バス",
                dataPath: "data/nankai",
                iconBasePath: "icons"
            },
            {
                id: "wakayama",
                name: "和歌山バス",
                dataPath: "data/wakayama",
                iconBasePath: "icons"
            }
        ];

        const allMarkerGroup = L.featureGroup();
        const allMissingVehicles = [];

        async function fetchJson(url, label) {
            const response = await fetch(
                `${url}?t=${Date.now()}`
            );

            if (!response.ok) {
                throw new Error(
                    `${label}取得失敗: ${response.status}`
                );
            }

            return response.json();
        }

        function getLatestUpdate(buses) {
            return buses
                .map(bus => bus.updateTime)
                .filter(Boolean)
                .map(value => ({
                    value,
                    date: new Date(
                        String(value).replace(/\//g, "-")
                    )
                }))
                .filter(item =>
                    !Number.isNaN(item.date.getTime())
                )
                .sort(
                    (a, b) =>
                        b.date.getTime() -
                        a.date.getTime()
                )[0] || null;
        }

        function updateStatusDisplay(results) {
            const updateElem =
                document.getElementById("update-time");

            /*
             * 更新表示はメインの南海バスを基準にする
             */
            const nankaiResult = results.find(
                result =>
                    result.companyConfig.id === "nankai"
            );

            const latest = nankaiResult
                ? getLatestUpdate(nankaiResult.buses)
                : null;

            if (!latest) {
                updateElem.textContent =
                    "最終更新：取得できませんでした";
                updateElem.className = "status-red";
                return;
            }

            const diffMin =
                (new Date() - latest.date) /
                1000 /
                60;

            updateElem.textContent =
                `最終更新：${latest.value}` +
                `（${Math.max(
                    0,
                    Math.floor(diffMin)
                )}分前）`;

            if (diffMin < 3) {
                updateElem.className =
                    "status-green";
            } else if (diffMin < 5) {
                updateElem.className =
                    "status-yellow";
            } else if (diffMin < 10) {
                updateElem.className =
                    "status-orange";
            } else {
                updateElem.className =
                    "status-red";
            }
        }

        function addCompanyMarkers(
            companyConfig,
            buses,
            vehicleData
        ) {
            console.log(
                `${companyConfig.name} GPS：` +
                `${buses.length}台`
            );

            console.log(
                `${companyConfig.name} 車両一覧：` +
                `${Object.keys(vehicleData).length}台`
            );

            for (const bus of buses) {
                const lat = Number(bus.lat);
                const lon = Number(bus.lon);

                if (
                    !Number.isFinite(lat) ||
                    !Number.isFinite(lon)
                ) {
                    continue;
                }

                const rawVehicleNum = String(
                    bus.vehicleNum || ""
                ).trim();

                const vehicleNum =
                    companyConfig.id === "nankai"
                        ? rawVehicleNum.padStart(6, "0")
                        : rawVehicleNum;

                const vehicle =
                    vehicleData[vehicleNum];

                const busIcon =
                    createBusIcon(
                        vehicle,
                        companyConfig
                    );

                const markerOptions = {};

                if (busIcon) {
                    markerOptions.icon = busIcon;
                } else {
                    const missingVehicle = {
                        company:
                            companyConfig.name,
                        vehicleNum,
                        route:
                            bus.route ||
                            "路線不明",
                        stop:
                            bus.stop ||
                            "現在地不明",
                        model:
                            vehicle?.model || "",
                        office:
                            vehicle?.office || "",
                        registration:
                            vehicle?.registration ||
                            "",
                        vehicleFound:
                            Boolean(vehicle)
                    };

                    allMissingVehicles.push(
                        missingVehicle
                    );

                    console.warn(
                        "アイコン未設定:",
                        missingVehicle
                    );
                }

                const marker = L.marker(
                    [lat, lon],
                    markerOptions
                );

                const model =
                    vehicle?.type ||
                    vehicle?.model ||
                    "型式不明";

                const busTypeName =
                    companyConfig.id === "wakayama"
                        ? (vehicle?.model || "車種不明")
                        : getBusTypeName(vehicle);

                const office =
                    vehicle?.office ||
                    vehicle?.company ||
                    "所属不明";

                const registration =
                    vehicle?.registration ||
                    "登録番号不明";

                const note =
                    vehicle?.note || "";

                const companyLine =
                    companyConfigs.length > 1
                        ? `
                            <div class="bus-info">
                                事業者：
                                ${escapeHtml(
                                    companyConfig.name
                                )}
                            </div>
                        `
                        : "";

                const popupHtml = `
                    <div class="bus-popup">
                        <div class="bus-number">
                            車番：
                            ${escapeHtml(
                                vehicleNum
                            )}
                        </div>

                        ${companyLine}

                        <div class="bus-route">
                            ${escapeHtml(
                                bus.route ||
                                "路線不明"
                            )}
                        </div>

                        <div class="bus-info">
                            現在地：
                            ${escapeHtml(
                                bus.stop ||
                                "不明"
                            )}
                            <br>

                            車種：
                            ${escapeHtml(
                                busTypeName
                            )}
                            <br>

                            型式：
                            ${escapeHtml(model)}
                            <br>

                            所属：
                            ${escapeHtml(office)}
                            <br>

                            登録番号：
                            ${escapeHtml(
                                registration
                            )}

                            ${
                                note
                                    ? `
                                        <br>
                                        備考：
                                        ${escapeHtml(
                                            note
                                        )}
                                    `
                                    : ""
                            }
                        </div>
                    </div>
                `;

                marker.bindPopup(popupHtml);
                marker.addTo(allMarkerGroup);
            }
        }

        async function loadCompany(companyConfig) {
            const [buses, vehicleData] =
                await Promise.all([
                    fetchJson(
                        `${companyConfig.dataPath}/gps.json`,
                        `${companyConfig.name} gps.json`
                    ),
                    fetchJson(
                        `${companyConfig.dataPath}/vehicles.json`,
                        `${companyConfig.name} vehicles.json`
                    )
                ]);

            window.vehicleData =
                window.vehicleData || {};

            window.vehicleData[
                companyConfig.id
            ] = vehicleData;

            addCompanyMarkers(
                companyConfig,
                buses,
                vehicleData
            );

            return {
                companyConfig,
                buses,
                vehicleData
            };
        }

        async function loadAllCompanies() {
            const settledResults =
                await Promise.allSettled(
                    companyConfigs.map(
                        companyConfig =>
                            loadCompany(
                                companyConfig
                            )
                    )
                );

            const successfulResults = [];
            const errors = [];

            settledResults.forEach(
                (result, index) => {
                    if (
                        result.status ===
                        "fulfilled"
                    ) {
                        successfulResults.push(
                            result.value
                        );
                    } else {
                        const companyConfig =
                            companyConfigs[index];

                        console.error(
                            `${companyConfig.name}の` +
                            "読み込みに失敗:",
                            result.reason
                        );

                        errors.push(
                            `${companyConfig.name}：` +
                            `${
                                result.reason
                                    ?.message ||
                                "不明なエラー"
                            }`
                        );
                    }
                }
            );

            allMarkerGroup.addTo(map);

            if (
                allMarkerGroup
                    .getLayers()
                    .length > 0
            ) {
                map.fitBounds(
                    allMarkerGroup.getBounds(),
                    {
                        padding: [30, 30]
                    }
                );
            }

            console.table(
                allMissingVehicles
            );

            console.log(
                "型式未判明・" +
                "アイコン未設定車両:",
                allMissingVehicles.length,
                "台"
            );

            window.missingVehicles =
                allMissingVehicles;

            updateStatusDisplay(
                successfulResults
            );

            if (
                errors.length > 0 &&
                successfulResults.length === 0
            ) {
                alert(
                    "バス情報を読み込めませんでした。\n" +
                    errors.join("\n")
                );
            } else if (errors.length > 0) {
                console.warn(
                    "一部事業者のデータを" +
                    "読み込めませんでした:",
                    errors
                );
            }
        }

        loadAllCompanies();

            setTimeout(
    () => {
        location.reload();
    },
    5 * 60 * 1000
);

// データ提供パネルの開閉
const creditsButton =
    document.getElementById("credits-button");

const creditsPanel =
    document.getElementById("credits-panel");

const creditsClose =
    document.getElementById("credits-close");

creditsButton.addEventListener("click", () => {
    creditsPanel.classList.toggle("open");
});

creditsClose.addEventListener("click", () => {
    creditsPanel.classList.remove("open");
});
    </script>
</body>
</html>
