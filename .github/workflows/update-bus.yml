name: Update bus positions

on:
  schedule:
    - cron: "2-59/5 * * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-bus-positions
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: node scraper.js

      - name: Commit updated bus data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add bus-gps.json
          git add bus-no-gps.json
          git add bus-errors.json

          if git diff --cached --quiet; then
            echo "更新なし"
            exit 0
          fi

          git commit -m "バス位置情報を自動更新"

          git pull --rebase origin main
          git push origin main